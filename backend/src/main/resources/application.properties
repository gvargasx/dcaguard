spring.application.name=dca-guard

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/dcaguard
spring.datasource.username=dcaguard
spring.datasource.password=dcaguard_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Firebase
firebase.project-id=${FIREBASE_PROJECT_ID:dca-guard-dev}

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174

# Rate Limiting
rate-limit.requests-per-minute=60
rate-limit.requests-per-minute-anonymous=30

# Market Data
market.provider=coingecko
market.coingecko.base-url=https://api.coingecko.com/api/v3
market.cache-ttl-seconds=60

# Logging
logging.level.com.dcaguard=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n

server.port=8080
