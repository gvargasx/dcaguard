version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dcaguard-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dcaguard}
      POSTGRES_USER: ${POSTGRES_USER:-dcaguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dcaguard_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dcaguard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcaguard-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dcaguard}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dcaguard}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dcaguard_secret}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-dca-guard-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-credentials.json
    ports:
      - "8080:808